<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - DriveOn Motors</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;800;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1c23;
            overflow-y: scroll;
        }

        .navbar {
            background-color: #1a1c23 !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .navbar-brand {
            font-weight: 900;
            letter-spacing: 0.1rem;
            font-size: 1.8rem;
            color: #ffffff !important;
        }
        .brand-highlight { color: #e63946; }

        .dark-profile-panel {
            background-color: #1a1c23;
            color: #edf2f4;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 1.5rem 4rem 3rem 4rem;
            min-height: calc(100vh - 90px);
            box-shadow: 20px 0 50px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 10;
        }

        .panel-header h2 { font-weight: 900; font-size: 2.2rem; letter-spacing: -0.5px; }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: #ffffff;
            display: flex;
            align-items: center;
        }

        .form-label {
            font-size: 0.75rem;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .custom-input {
            background-color: #2b2d42;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 12px 15px;
            border-radius: 6px;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
        }

        .custom-input:focus {
            background-color: #35394a;
            border-color: #e63946;
            outline: none;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.2);
            color: #ffffff;
        }

        .custom-input:read-only {
            background-color: #1a1c23;
            border-color: transparent;
            padding-left: 0;
            color: #a0a5b5;
        }
        .custom-input:read-only:focus { box-shadow: none; }

        .btn-brand {
            background-color: #e63946;
            color: white;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 20px;
            transition: all 0.3s ease;
        }
        .btn-brand:hover { background-color: #d90429; color: white; }

        .btn-outline-light {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 12px 20px;
        }

        .profile-image-container {
            background-image: linear-gradient(to right, rgba(26, 28, 35, 0.3) 0%, rgba(26, 28, 35, 0.7) 100%), url('/images/ProfileImg.png');
            background-size: cover;
            background-position: center;
            height: 100%;
            position: relative;
        }

        .image-overlay-text {
            position: absolute;
            bottom: 40px;
            left: 40px;
            color: white;
        }

        @media (max-width: 992px) {
            .dark-profile-panel { padding: 2rem; box-shadow: none; }
            .profile-image-container { display: none; }
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark pb-3 pt-3">
    <div class="container-fluid px-4 px-lg-5">
        <a class="navbar-brand" th:href="@{/}">
            DRIVE<span class="brand-highlight">ON</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item me-4">
                    <a class="nav-link text-light" th:href="@{/users/profile}">
                        <i class="fa-solid fa-user me-1 text-warning"></i>
                        <span class="fw-bold" th:text="${userProfile.username}">User</span>
                    </a>
                </li>
                <li class="nav-item me-3"><a class="nav-link text-light" th:href="@{/}"><i class="fa-solid fa-warehouse me-1 brand-highlight"></i> My Garage</a></li>
                <li class="nav-item me-2"><a class="nav-link text-light" th:href="@{/appointments/add}"><i class="fa-solid fa-calendar-plus me-1 brand-highlight"></i> Book Service</a></li>
                <li class="nav-item"><a class="nav-link text-light" th:href="@{/vehicles/add}"><i class="fa-solid fa-car me-1 brand-highlight"></i> Add Vehicle</a></li>
                <li class="nav-item ms-3">
                    <form th:action="@{/users/logout}" th:method="POST" class="m-0">
                        <button type="submit" class="btn btn-outline-danger btn-sm fw-bold px-3 py-1 rounded-1">
                            <i class="fa-solid fa-right-from-bracket me-1"></i> Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid p-0">
    <div class="row g-0">

        <div class="col-lg-5 col-md-12">
            <div class="dark-profile-panel">

                <div class="panel-header mb-4 mt-2">
                    <h2>Edit Profile</h2>
                    <p class="text-white-50 mb-0">Update your personal contact information.</p>
                </div>

                <div class="section-title">
                    <i class="fa-solid fa-pen-to-square me-2 text-white-50"></i> Personal Info
                </div>

                <form th:action="@{/users/profile/edit}" th:method="POST" th:object="${userProfile}">

                    <div class="mb-3">
                        <label class="form-label">Email Address (Read Only)</label>
                        <input type="text" th:field="*{email}" class="form-control custom-input" readonly />
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Username (Read Only)</label>
                        <input type="text" th:field="*{username}" class="form-control custom-input" readonly />
                    </div>

                    <div class="mb-3">
                        <label for="firstName" class="form-label">First Name <span class="text-danger">*</span></label>
                        <input type="text" id="firstName" th:field="*{firstName}" class="form-control custom-input" />
                        <small th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="text-danger fw-bold d-block mt-1"></small>
                    </div>

                    <div class="mb-3">
                        <label for="lastName" class="form-label">Last Name <span class="text-danger">*</span></label>
                        <input type="text" id="lastName" th:field="*{lastName}" class="form-control custom-input" />
                        <small th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="text-danger fw-bold d-block mt-1"></small>
                    </div>

                    <div class="mb-4">
                        <label for="phoneNumber" class="form-label">Phone Number <span class="text-danger">*</span></label>
                        <input type="text" id="phoneNumber" th:field="*{phoneNumber}" class="form-control custom-input" />
                        <small th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="text-danger fw-bold d-block mt-1"></small>
                    </div>

                    <div class="d-flex gap-3 mt-2 mb-4">
                        <button type="submit" class="btn btn-brand rounded-1 flex-grow-1">Save Changes</button>
                        <a th:href="@{/users/profile}" class="btn btn-outline-light rounded-1">Cancel</a>
                    </div>
                </form>

            </div>
        </div>

        <div class="col-lg-7 d-none d-lg-block p-0">
            <div class="profile-image-container">
                <div class="image-overlay-text">
                    <h3 class="fw-bold mb-1 text-white">Your Trusted Partner.</h3>
                    <p class="mb-0 text-white-50">Keeping you safe on the road since 2026.</p>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
